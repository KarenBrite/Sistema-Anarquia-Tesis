{% extends "base.html" %}
{% block content %}
<div class="container mensaje-container">
    <h2 class="titulo">Correo enviado</h2>
    <p class="descripcion">Hemos enviado instrucciones a tu correo electrónico para restablecer la contraseña.</p>
    <a href="{% url 'login' %}" class="btn-volver">Volver al inicio</a>
</div>
{% endblock %}

<style>
    .mensaje-container {
        background-color: #fff;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
        margin: 50px auto;
        text-align: center;
    }

    .titulo {
        font-size: 2rem;
        color: #2c3e50;
        margin-bottom: 15px;
    }

    .descripcion {
        font-size: 1.1rem;
        color: #7f8c8d;
        margin-bottom: 20px;
    }

    .btn-volver {
        display: inline-block;
        padding: 12px 20px;
        background-color: #388E3C;
        color: white;
        text-decoration: none;
        font-size: 1.1rem;
        border-radius: 5px;
        transition: background-color 0.3s;
    }

    .btn-volver:hover {
        background-color: #2c6c32;
    }

    .btn-volver:focus {
        outline: none;
    }
</style>
