{% extends "base.html" %}
{% load static %}

{% block login_button %}{% endblock %}
{% block menu %}{% endblock %}

{% block content %}
<h2 class="titulo">Restablecer Contraseña</h2>
<p class="descripcion">Ingresa tu nueva contraseña:</p>

<form method="post" class="formulario">
    {% csrf_token %}
    
    <!-- Campo de contraseña -->
    <div class="campo">
        <label for="{{ form.new_password.id_for_label }}" class="label">Nueva Contraseña</label>
        {{ form.new_password }}
    </div>
    
    <!-- Campo de confirmación de contraseña -->
    <div class="campo">
        <label for="{{ form.confirm_password.id_for_label }}" class="label">Confirmar Contraseña</label>
        {{ form.confirm_password }}
    </div>

    <!-- Botón de envío -->
    <button type="submit" class="btn-submit">Restablecer Contraseña</button>
</form>

<style>
    body {
        font-family: 'Arial', sans-serif;
        background-color: #f4f7f6;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        padding: 0;
    }

    .titulo {
        font-size: 2.2rem;
        color: #2c3e50;
        text-align: center;
        margin-bottom: 15px;
        font-weight: bold;
    }

    .descripcion {
        font-size: 1.1rem;
        color: #7f8c8d;
        text-align: center;
        margin-bottom: 25px;
    }

    .formulario {
        background-color: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 450px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .formulario:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 25px rgba(0, 0, 0, 0.15);
    }

    .campo {
        margin-bottom: 25px;
    }

    .campo input {
        width: 100%;
        padding: 14px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 1.1rem;
        background-color: #f9f9f9;
        transition: border-color 0.3s, background-color 0.3s;
    }

    .campo input:focus {
        border-color: #388E3C;
        background-color: #fff;
        outline: none;
    }

    .btn-submit {
        width: 100%;
        padding: 16px;
        background-color: #388E3C;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1.3rem;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.3s;
    }

    .btn-submit:hover {
        background-color: #2c6c32;
        transform: translateY(-3px);
    }

    .btn-submit:focus {
        outline: none;
    }

    .label {
        display: block;
        font-size: 1rem;
        color: #333;
        margin-bottom: 8px;
    }
</style>
{% endblock %}
