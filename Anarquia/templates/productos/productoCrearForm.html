{% extends "base.html" %} 
{% load static %}
{% block content %}
<link rel="stylesheet" type="text/css" href="{% static 'css/styles.css' %}">

<div id="contenido" class="container">
    <h3 class="text-muted mb-4 text-center sticky-top p-2" style="font-weight: normal; font-size: 2rem; top: 70px; z-index: 1050;">
        <i class="fa-solid fa-plus" style="font-size: 23px;"></i> Crear Producto
    </h3>
    <form method="post" enctype="multipart/form-data" class="bg-white p-5 rounded shadow-lg">
        {% csrf_token %}
        
        <!-- Renderiza el formulario, pero omite el campo de imagen del producto -->
        {% for field in form %}
            {% if field.name != 'imagen' %}
                <div class="form-group">
                    {{ field.label_tag }}
                    {{ field }}
                </div>
            {% endif %}
        {% endfor %}

        <!-- Campo de imagen con vista previa (manual) -->
        <div class="form-group">
            <label>
                <i class="fa-solid fa-image"></i> Cargar Imagen
            </label> <!-- Título con icono -->
            <input type="file" id="id_imagen" name="imagen" class="form-control" accept="image/*" onchange="previewImage(event)">
            <div id="imagePreview" class="mt-3">
                <img id="previewImg" src="#" alt="Vista previa de la imagen" style="display:none; width: 100%; max-height: 300px; object-fit: contain;" />
            </div>
        </div>

        <!-- Botón para enviar el formulario -->
        <div class="d-flex justify-content-center mt-4">
            <button type="submit" class="btn btn-icon m-2">
                <i class="fa-solid fa-floppy-disk"></i>  <!-- Icono más moderno -->
            </button>
            <a href="{% url 'productosLista' %}" class="btn btn-icon m-2">
                <i class="fa-solid fa-rotate-left"></i>  <!-- Icono de cancelar más moderno -->
            </a>
        </div>
    </form>
</div>

<script>
    // Función para mostrar la vista previa de la imagen
    function previewImage(event) {
        var file = event.target.files[0];
        var reader = new FileReader();
        reader.onload = function(e) {
            var preview = document.getElementById('previewImg');
            preview.src = e.target.result;
            preview.style.display = 'block';  // Muestra la imagen previa
        };
        if (file) {
            reader.readAsDataURL(file);
        }
    }
</script>

{% endblock %}
